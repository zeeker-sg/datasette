[project]
name = "zeeker-frontend"
version = "0.1.0"
description = "FastAPI frontend for data.zeeker.sg (placeholder; see .planning/ROADMAP.md M2)."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]==0.136.0",
    "httpx==0.28.1",
    "jinja2==3.1.6",
    "uvicorn[standard]==0.44.0",
]

[dependency-groups]
dev = [
    "black==26.3.1",
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "pytest-httpx==0.36.0",
    "ruff==0.15.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zeeker_frontend"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
